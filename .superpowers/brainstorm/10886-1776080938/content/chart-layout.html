<h2>图表布局方式</h2>
<p class="subtitle">采购订单和销售订单的柱状图如何排列？</p>

<div class="options">
  <div class="option" data-choice="separate" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>分开两张图表</h3>
      <p>采购订单和销售订单各一张独立图表，并排显示</p>
      <div class="mockup" style="margin-top:12px">
        <div style="display:flex;gap:16px">
          <div style="flex:1;background:#f5f5f5;padding:24px;border-radius:8px;text-align:center">
            <div style="font-size:12px;color:#666;margin-bottom:8px">采购订单金额</div>
            <div style="display:flex;align-items:flex-end;justify-content:center;gap:8px;height:60px">
              <div style="width:24px;height:30px;background:#1890ff;border-radius:4px 4px 0 0"></div>
              <div style="width:24px;height:45px;background:#1890ff;border-radius:4px 4px 0 0"></div>
              <div style="width:24px;height:35px;background:#1890ff;border-radius:4px 4px 0 0"></div>
              <div style="width:24px;height:50px;background:#1890ff;border-radius:4px 4px 0 0"></div>
            </div>
          </div>
          <div style="flex:1;background:#f5f5f5;padding:24px;border-radius:8px;text-align:center">
            <div style="font-size:12px;color:#666;margin-bottom:8px">销售订单金额</div>
            <div style="display:flex;align-items:flex-end;justify-content:center;gap:8px;height:60px">
              <div style="width:24px;height:40px;background:#52c41a;border-radius:4px 4px 0 0"></div>
              <div style="width:24px;height:55px;background:#52c41a;border-radius:4px 4px 0 0"></div>
              <div style="width:24px;height:25px;background:#52c41a;border-radius:4px 4px 0 0"></div>
              <div style="width:24px;height:45px;background:#52c41a;border-radius:4px 4px 0 0"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="combined" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>合并一张图表</h3>
      <p>采购和销售在同一个图表中对比显示，便于分析收支情况</p>
      <div class="mockup" style="margin-top:12px">
        <div style="background:#f5f5f5;padding:24px;border-radius:8px">
          <div style="display:flex;justify-content:center;gap:24px;margin-bottom:12px">
            <span style="font-size:12px"><span style="display:inline-block;width:12px;height:12px;background:#1890ff;border-radius:2px;margin-right:4px"></span>采购</span>
            <span style="font-size:12px"><span style="display:inline-block;width:12px;height:12px;background:#52c41a;border-radius:2px;margin-right:4px"></span>销售</span>
          </div>
          <div style="display:flex;align-items:flex-end;justify-content:center;gap:16px;height:80px">
            <div style="display:flex;gap:4px;align-items:flex-end">
              <div style="width:20px;height:30px;background:#1890ff;border-radius:4px 4px 0 0"></div>
              <div style="width:20px;height:45px;background:#52c41a;border-radius:4px 4px 0 0"></div>
            </div>
            <div style="display:flex;gap:4px;align-items:flex-end">
              <div style="width:20px;height:50px;background:#1890ff;border-radius:4px 4px 0 0"></div>
              <div style="width:20px;height:35px;background:#52c41a;border-radius:4px 4px 0 0"></div>
            </div>
            <div style="display:flex;gap:4px;align-items:flex-end">
              <div style="width:20px;height:35px;background:#1890ff;border-radius:4px 4px 0 0"></div>
              <div style="width:20px;height:60px;background:#52c41a;border-radius:4px 4px 0 0"></div>
            </div>
            <div style="display:flex;gap:4px;align-items:flex-end">
              <div style="width:20px;height:45px;background:#1890ff;border-radius:4px 4px 0 0"></div>
              <div style="width:20px;height:40px;background:#52c41a;border-radius:4px 4px 0 0"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
